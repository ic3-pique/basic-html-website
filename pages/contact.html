<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me</title>
  </head>
  <body>
    <section>
      <main>
        <form action="">
          <input
            type="text"
            name="fullName"
            id="fullName"
            placeholder="Enter your Full name"
          />
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Enter your Email Address"
          />
          <textarea
            name="message"
            rows="4"
            cols="40"
            id="message"
            placeholder="Enter your message here..."
          ></textarea>
        </form>
      </main>
    </section>
  </body>
</html>
