      </header>
      <main>
        <h3>If you have a question, drop us a mail</h3>
        <form action="">
          <input
            type="text"
            name="fullName"
            id="fullName"
            placeholder="Enter your Full name"
          />
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Enter your Email Address"
          />
          <textarea
            name="message"
            rows="4"
            cols="40"
            id="message"
            placeholder="Enter your message here..."
          ></textarea>
          <input type="submit" name="submit" value="Submit" id="" />
        </form>
      </main>
    </section>
